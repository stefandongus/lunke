<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Lunke Admin</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lunke Admin" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1209;
      --dirt:   #2b1f0e;
      --earth:  #4a3520;
      --sand:   #c8a86b;
      --white:  #f5f0ea;
      --accent: #e8580a;
      --green:  #1e6b1e;
      --red:    #7a1a1a;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
    }

    /* ── LOGIN ── */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 1.5rem;
    }

    #loginScreen img { width: 200px; height: auto; }

    .login-box {
      width: 100%;
      max-width: 360px;
      background: var(--dirt);
      border-radius: var(--radius);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login-box h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--sand);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .login-box input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--earth);
      border: 1px solid rgba(200,168,107,0.2);
      border-radius: 8px;
      color: var(--white);
      font-size: 1rem;
      outline: none;
    }

    .login-box input:focus { border-color: var(--accent); }

    #loginError {
      color: #ff6b6b;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    /* ── APP ── */
    #appScreen { display: none; min-height: 100vh; padding-bottom: 3rem; }

    .app-header {
      background: var(--dirt);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(200,168,107,0.15);
    }

    .app-header img { height: 32px; width: auto; }

    .logout-btn {
      font-size: 0.8rem;
      color: rgba(245,240,234,0.4);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0.25rem 0.5rem;
    }

    .logout-btn:hover { color: var(--accent); }

    .app-body {
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── CARDS ── */
    .card {
      background: var(--dirt);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sand);
      margin-bottom: 1rem;
    }

    /* ── TOGGLE ── */
    .toggle-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .toggle-btn {
      padding: 0.75rem 0.5rem;
      border-radius: 8px;
      border: 2px solid transparent;
      background: var(--earth);
      color: rgba(245,240,234,0.5);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .toggle-btn.active-none  { border-color: var(--sand); color: var(--white); background: var(--earth); }
    .toggle-btn.active-open  { border-color: #4caf50; color: #fff; background: var(--green); }
    .toggle-btn.active-close { border-color: #ef5350; color: #fff; background: var(--red); }

    /* STATUS PREVIEW */
    .status-preview {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      display: none;
    }

    .status-preview.show { display: block; }
    .status-preview.open  { background: var(--green); color: #fff; }
    .status-preview.close { background: var(--red);   color: #fff; }

    /* ── INPUTS ── */
    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    .field label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sand);
    }

    .field input, .field textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--earth);
      border: 1px solid rgba(200,168,107,0.2);
      border-radius: 8px;
      color: var(--white);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      resize: none;
    }

    .field input:focus,
    .field textarea:focus { border-color: var(--accent); }

    .field input::placeholder,
    .field textarea::placeholder { color: rgba(245,240,234,0.25); }

    .fields-stack { display: flex; flex-direction: column; gap: 0.75rem; }

    /* ── SAVE BUTTON ── */
    .save-btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: var(--white);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }

    .save-btn:hover { background: #c44608; }
    .save-btn:disabled { background: var(--earth); color: rgba(245,240,234,0.3); cursor: not-allowed; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e6b1e;
      color: #fff;
      padding: 0.85rem 1.75rem;
      border-radius: 100px;
      font-weight: 700;
      font-size: 0.9rem;
      transition: transform 0.3s ease;
      z-index: 99;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--red); }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <img src="https://raw.githubusercontent.com/stefandongus/lunke/main/logos/lunke_motul/1.png" alt="Lunke Trails" />
    <div class="login-box">
      <h2>Admin Login</h2>
      <input type="password" id="pwInput" placeholder="Passwort" autocomplete="current-password" />
      <p id="loginError">Falsches Passwort</p>
      <button class="save-btn" onclick="doLogin()">Einloggen</button>
    </div>
  </div>

  <!-- APP -->
  <div id="appScreen">
    <div class="app-header">
      <img src="https://raw.githubusercontent.com/stefandongus/lunke/main/logos/lunke_motul/1.png" alt="Lunke Trails" />
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>

    <div class="app-body">

      <!-- PARK STATUS -->
      <div class="card">
        <p class="card-title">Park Status</p>
        <div class="toggle-group">
          <button class="toggle-btn active-none" id="btnNone" onclick="setStatus('none')">Keine Info</button>
          <button class="toggle-btn" id="btnOpen" onclick="setStatus('open')">✓ Offen</button>
          <button class="toggle-btn" id="btnClose" onclick="setStatus('closed')">✗ Geschlossen</button>
        </div>
        <div id="statusPreview" class="status-preview"></div>
      </div>

      <!-- ÖFFNUNGSZEIT HEUTE -->
      <div class="card">
        <p class="card-title">Öffnungszeit heute</p>
        <div class="field">
          <input type="text" id="heuteInput" placeholder="z.B. Ab 18:00 Uhr" />
        </div>
      </div>

      <!-- NÄCHSTE TERMINE -->
      <div class="card">
        <p class="card-title">Nächste Parköffnungen</p>
        <div class="fields-stack">
          <div class="field">
            <label>Termin 1</label>
            <input type="text" id="z1" placeholder="z.B. Sa 21.06. ab 12:00" />
          </div>
          <div class="field">
            <label>Termin 2</label>
            <input type="text" id="z2" placeholder="z.B. So 22.06. ab 12:00" />
          </div>
          <div class="field">
            <label>Termin 3</label>
            <input type="text" id="z3" placeholder="z.B. Mi 25.06. ab 15:00" />
          </div>
        </div>
      </div>

      <!-- NEWS -->
      <div class="card">
        <p class="card-title">News <span style="color:rgba(245,240,234,0.3);font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></p>
        <div class="field">
          <textarea id="newsInput" rows="3" placeholder="Aktuelle News für die Website..."></textarea>
        </div>
      </div>

      <!-- SPEICHERN -->
      <button class="save-btn" id="saveBtn" onclick="saveData()">Speichern & Live schalten</button>

    </div>
  </div>

  <div id="toast"></div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyB9vFVCG-RKP_ib8URqeF-FIZ7lhNaQh8L0ZCzRlsLUyZjfuI8SDSZap8NN8CyQyNS/exec';
    const SHEET_ID   = '1n5vq-sumrb-FdBI710BHaWjJo1ulDCKT07nD0r-22i0';
    const CSV_URL    = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
    const PASSWORD   = 'lunke2026'; // ← hier Passwort ändern

    let currentStatus = 'none';

    // ── LOGIN ──
    document.getElementById('pwInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      const pw = document.getElementById('pwInput').value;
      if (pw === PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        loadCurrentData();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function doLogout() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
      document.getElementById('pwInput').value = '';
    }

    // ── STATUS TOGGLE ──
    function setStatus(val) {
      currentStatus = val;
      document.getElementById('btnNone').className  = 'toggle-btn' + (val==='none'   ? ' active-none'  : '');
      document.getElementById('btnOpen').className  = 'toggle-btn' + (val==='open'   ? ' active-open'  : '');
      document.getElementById('btnClose').className = 'toggle-btn' + (val==='closed' ? ' active-close' : '');

      const preview = document.getElementById('statusPreview');
      if (val === 'open') {
        preview.textContent = "✓ Website zeigt: WE'RE OPEN (grüne Kachel)";
        preview.className = 'status-preview show open';
      } else if (val === 'closed') {
        preview.textContent = "✗ Website zeigt: WE'RE CLOSED (rote Kachel)";
        preview.className = 'status-preview show close';
      } else {
        preview.className = 'status-preview';
      }
    }

    // ── AKTUELLEN STAND LADEN ──
    function loadCurrentData() {
      fetch(CSV_URL)
        .then(r => r.text())
        .then(csv => {
          const rows = csv.trim().split('\n');
          const headers = rows[0].split(',').map(h => h.trim().replace(/"/g,''));
          const values  = rows[1].split(',').map(v => v.trim().replace(/"/g,''));
          const data = {};
          headers.forEach((h, i) => data[h] = values[i] || '');

          // Status
          const s = (data.park_offen || '').toLowerCase();
          if (['open','yes','ja','offen'].includes(s)) setStatus('open');
          else if (['closed','no','nein','zu'].includes(s)) setStatus('closed');
          else setStatus('none');

          // Felder
          document.getElementById('heuteInput').value = data.oeffnungszeit_heute || '';
          document.getElementById('z1').value = data.oeffnungszeiten_1 || '';
          document.getElementById('z2').value = data.oeffnungszeiten_2 || '';
          document.getElementById('z3').value = data.oeffnungszeiten_3 || '';
          document.getElementById('newsInput').value = data.news || '';
        })
        .catch(() => {});
    }

    // ── SPEICHERN ──
    function saveData() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Wird gespeichert...';

      const statusMap = { none: '', open: 'Yes', closed: 'No' };

      const payload = {
        park_offen:          statusMap[currentStatus],
        oeffnungszeit_heute: document.getElementById('heuteInput').value.trim(),
        oeffnungszeiten_1:   document.getElementById('z1').value.trim(),
        oeffnungszeiten_2:   document.getElementById('z2').value.trim(),
        oeffnungszeiten_3:   document.getElementById('z3').value.trim(),
        news:                document.getElementById('newsInput').value.trim(),
      };

      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        showToast('✓ Gespeichert! Website ist live.', false);
      })
      .catch(() => {
        showToast('Fehler beim Speichern', true);
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = 'Speichern & Live schalten';
      });
    }

    // ── TOAST ──
    function showToast(msg, isError = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show' + (isError ? ' error' : '');
      setTimeout(() => { t.className = isError ? 'error' : ''; }, 3000);
    }
  </script>
</body>
</html>
