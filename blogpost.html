<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog – Lunke Trails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dirt: #2b1f0e; --earth: #4a3520; --sand: #c8a86b;
      --white: #f5f0ea; --ink: #1a1209; --accent: #e8580a;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--ink); color: var(--white); }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 64px;
      background: rgba(26,18,9,0.97);
      border-bottom: 1px solid rgba(139,94,42,0.25);
    }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 38px; width: auto; }
    .nav-back { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sand); text-decoration: none; }
    .nav-back:hover { color: var(--accent); }

    .post-hero {
      width: 100%;
      aspect-ratio: 4 / 3;
      max-height: 60vh;
      overflow: hidden;
      background: var(--earth);
    }
    .post-hero img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }

    .post-body { max-width: 780px; margin: 0 auto; padding: 4rem 2.5rem 6rem; }

    .post-datum {
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent);
      margin-bottom: 1rem; display: block;
    }

    .post-titel {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
      font-size: clamp(2.2rem, 6vw, 4rem); text-transform: uppercase;
      line-height: 1; color: var(--white);
      margin-bottom: 2.5rem; padding-bottom: 2rem;
      border-bottom: 1px solid rgba(139,94,42,0.3);
    }

    .post-text {
      color: rgba(245,240,234,0.78);
      font-size: 1.05rem;
      line-height: 1.85;
      white-space: pre-wrap;
    }

    .back-link {
      display: inline-block; margin-top: 3rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      nav { padding: 0 1.25rem; }
      .post-body { padding: 3rem 1.25rem 4rem; }
      .post-hero { height: 40vh; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="https://raw.githubusercontent.com/stefandongus/lunke/main/logos/lunke_motul/1.png" alt="Lunke Trails" />
    </a>
    <a href="blog.html" class="nav-back">← Alle Posts</a>
  </nav>

  <div id="postHero" class="post-hero" style="display:none">
    <img id="postFoto" src="" alt="" />
  </div>

  <div class="post-body">
    <span class="post-datum" id="postDatum"></span>
    <h1 class="post-titel" id="postTitel">Wird geladen…</h1>
    <p class="post-text" id="postText"></p>
    <a href="blog.html" class="back-link">← Zurück zum Blog</a>
  </div>

  <script>
    const WORKER = 'https://lunke-github-proxy.stefan-cc2.workers.dev';

    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('post');
      if (!slug) { document.getElementById('postTitel').textContent = 'Post nicht gefunden.'; return; }

      try {
        const res = await fetch(`${WORKER}?path=${encodeURIComponent('blog/' + slug + '.json')}`);
        const file = await res.json();
        const raw = file.content.replace(/\n/g,'');
        const bytes = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
        const decoded = new TextDecoder('utf-8').decode(bytes);
        const post = JSON.parse(decoded);

        document.title = `${post.titel} – Lunke Trails`;

        if (post.foto) {
          document.getElementById('postFoto').src = post.foto;
          document.getElementById('postHero').style.display = 'block';
        }

        const datum = post.datum ? new Date(post.datum).toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'}) : '';
        document.getElementById('postDatum').textContent = datum;
        document.getElementById('postTitel').textContent = post.titel || '';
        document.getElementById('postText').textContent = post.text || '';
      } catch(e) {
        document.getElementById('postTitel').textContent = 'Post nicht gefunden.';
      }
    }

    loadPost();
  </script>
</body>
</html>
